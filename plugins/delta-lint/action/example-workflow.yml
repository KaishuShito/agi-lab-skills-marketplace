# .github/workflows/delta-lint.yml
#
# Example: Add this to your repository to auto-scan PRs for structural contradictions.

name: delta-lint

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for diff analysis

      - name: delta-lint scan
        uses: karesansui-u/agi-lab-skills-marketplace/plugins/delta-lint/action@main
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          severity: "high"          # high | medium | low
          # model: "claude-sonnet-4-20250514"
          # max_diff_files: "20"    # Skip large PRs
          # comment_on_clean: "false"
