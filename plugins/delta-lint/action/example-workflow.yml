# .github/workflows/delta-lint.yml
#
# Add this to your repository to auto-scan PRs for structural contradictions.
# Three modes available: review, suggest, autofix

name: delta-lint

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write       # needed for autofix (push commits)
  pull-requests: write  # needed for review comments + suggestions

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: delta-lint
        uses: karesansui-u/agi-lab-skills-marketplace/plugins/delta-lint/action@main
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # --- Mode ---
          # review  : Comment only (default, for teams)
          # suggest : Comment + GitHub Suggested Changes inline
          # autofix : Auto-commit fixes to the PR branch (for solo/vibe coding)
          mode: "suggest"

          severity: "high"
          # model: "claude-sonnet-4-20250514"
          # max_diff_files: "20"
          # fail_on_findings: "false"
          # comment_on_clean: "false"
